version: "3.8"

services:
  db:
    image: postgres:16
    container_name: opale_db
    environment:
      - POSTGRES_DB=opale_db
      - POSTGRES_USER=opale_user
      - POSTGRES_PASSWORD=opale_password
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ldap:
    image: osixia/openldap:latest
    container_name: opale_ldap
    environment:
      - LDAP_ORGANISATION=ART Cameroun
      - LDAP_DOMAIN=art.cm
      - LDAP_ADMIN_PASSWORD=adminpassword
      # Load memberof overlay in OpenLDAP
      - LDAP_OPENLDAP_GID=0
      - LDAP_OPENLDAP_UID=0
    ports:
      - "389:389"
      - "636:636"
    volumes:
      - ldap_data:/var/lib/ldap
      - ldap_config:/etc/ldap/slapd.d

volumes:
  postgres_data:
  ldap_data:
  ldap_config:
